title: "AI Tech Resource Blog"
description: "Structured AI/LLM data resource for developers and power users."
url: "https://www.jsonhouse.com"
baseurl: ""
lang: "en"
timezone: Asia/Seoul

theme: jekyll-theme-chirpy

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /posts/:title/
future: true

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-paginate

toc: true
comments: false
math: false
mermaid: false

# Chirpy required: tabs collection
collections:
  tabs:
    output: true
    sort_by: order

# Google AdSense
google_adsense: ca-pub-4708234819958995

social:
  name: "AI Tech Resource Blog"
  links: []

paginate: 10
paginate_path: "/page:num/"

twitter:
  username: ""

author:
  name: "AI Tech Resource Blog"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true
      comments: false
      permalink: /posts/:title/
      author: ai_tech_blog
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

exclude:
  - Gemfile
  - PIPELINE_PROMPT.md
  - PROJECT_CONTEXT.md
  - CLAUDE.md
  - SEO_GUIDE.md
  - SOURCES.md
  - "*.docx"
  - node_modules
  - vendor
  - pipeline_output
  - chirpy_migration_prompt.md
