title: "AI Tech Resource Blog"
description: "Structured AI/LLM data resource for developers and power users."
url: "https://www.jsonhouse.com"
baseurl: ""
lang: "en"
timezone: Asia/Seoul

theme: jekyll-theme-chirpy

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /posts/:title/

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

toc: true
comments: false
math: false
mermaid: false

# Google AdSense
google_adsense: ca-pub-4708234819958995

social:
  name: "AI Tech Resource Blog"
  links: []

paginate: 10

twitter:
  username: ""

author:
  name: "AI Tech Resource Blog"

# Collections
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      toc: true
      author: ai_tech_blog

# SEO defaults
# Feed
feed:
  categories:
    - ai-models
    - ai-developer-tools
    - prompt-engineering
    - ai-productivity
    - ai-data
    - ai-safety

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - PIPELINE_PROMPT.md
  - PROJECT_CONTEXT.md
  - CLAUDE.md
  - SEO_GUIDE.md
  - SOURCES.md
  - "*.docx"
  - node_modules
  - vendor
  - pipeline_output
  - chirpy_migration_prompt.md
