<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% seo title=false %}
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; line-height: 1.6; color: #333; }
    nav { border-bottom: 1px solid #eee; margin-bottom: 40px; padding-bottom: 15px; }
    nav a { margin-right: 20px; text-decoration: none; color: #0066cc; }
    h1, h2, h3 { line-height: 1.3; }
    table { border-collapse: collapse; width: 100%; margin: 20px 0; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #f5f5f5; }
    code { background: #f5f5f5; padding: 2px 5px; border-radius: 3px; font-family: monospace; }
    pre { background: #f5f5f5; padding: 15px; border-radius: 5px; overflow-x: auto; }
    pre code { background: none; padding: 0; }
    .tldr { background: #e8f4fd; border-left: 4px solid #0066cc; padding: 15px 20px; margin: 20px 0; border-radius: 0 5px 5px 0; }
    footer { margin-top: 60px; border-top: 1px solid #eee; padding-top: 20px; color: #888; font-size: 0.9em; }
  </style>
</head>
<body>
  <nav>
    <a href="/">AI Tech Resource Blog</a>
    <a href="/category/ai-models/">AI Models</a>
    <a href="/category/ai-developer-tools/">Dev Tools</a>
    <a href="/category/prompt-engineering/">Prompts</a>
    <a href="/api/posts.json">API</a>
  </nav>
  {{ content }}
  <footer>
    <p>AI Tech Resource Blog — Structured data for AI developers and power users.</p>
    <p><a href="/llms.txt">llms.txt</a> | <a href="/api/posts.json">posts.json</a> | <a href="/sitemap.xml">sitemap</a></p>
  </footer>
</body>
</html>
